body:
  text: 海東新羅國侍講兼翰林學士承務郎前守兵部侍郎權知瑞書監事賜紫金魚袋崔致遠結案纂靈記云西京華嚴寺僧千里撰藏公別録縷陳靈跡然是傳未傳海域如渴聞梅耳目非長難矜井識今且討片文別記中概見藏之軌躅可聳人視聽者掇而聚之古來為傳之體不同或先統其致後鋪所因或首標姓名尾綰功烈故大史公每為大賢如夷齊孟軻輩立傳必前冠以所聞然後始著其行事此無他德行既峻譜録宜異故爾愚也雖慚郢唱試效越顰仰彼圓宗列其盈數仍就藏所著華嚴三昧觀直心中十義而配譬焉一族姓廣大心二遊學甚深心三削染方便心四講演堅固心五傳譯無間心六著述折伏心七修身善巧心八濟俗不二心九垂訓無礙心十示滅圓明心深悲兩心互准可見書云措諸枉思無邪經曰為淨土是道場乃直心之謂也事將顯實語不芟繁悉舉因緣聊彰本跡其傳第一科曰釋法藏者梵言達摩多羅字賢首梵言跋陀羅室利帝賜別號國一法師俗姓康氏本康居國人屠門濫說解在字釋雖僧會異時而曇諦同跡亦如法護月支人支氏吉藏安息人安氏外所謂因生以賜姓是也諦護後稱支竺蓋從西師改焉猶吉法二藏皆歸釋氏內所謂四河入海是也高曾蟬聯為彼國相祖父自康居來朝庇身輦下考諱謐皇朝贈左衛中郎將母氏夢吞日光而孕以貞觀十七年癸卯暢月旁死魄而生身當四方合統之朝值三寶重興之運庸詎非商頌所謂自天降康者乎康居地接竺乾人侔梵衆既饒師子能胤法王偉矣哉弟寶藏以忠孝聞此之謂族姓因緣豈非以廣大心誓願觀一切法悉如如乎第二科曰年甫十七顯慶四年己未志鋭擇師遍謁都邑緇英懊其拙於用大遂辭親求法於太白山餌朮數年敷𨵃方等後聞親疾出谷入京時智儼法師於雲華寺講華嚴經藏於中夜匆覩神光來燭庭宇乃歎曰當有異人弘揚大教翌旦就寺膜拜已因設數問言皆出意表儼嗟賞曰比丘義龍輩尚罕扣斯端何計仁賢發皇耳目或告曰是居士雲棲朮食久玩雜華為覲慈親乍來至此藏既餐儼之妙解以為真吾師也儼亦喜傳炷之得人自是預流徒中後發前至高超二運白牛也力騁通衢俯視六宗赤象也躬行實土不由他悟莫若自知此之謂遊學因緣豈非以甚深心誓觀真如要盡源底乎第三科曰及總章元年儼將化去藏猶居俗時年二十六儼乃纍道成薄塵二大德曰此賢者注意於華嚴蓋無師自悟紹隆遺法其惟是人幸假餘光俾沾制度至咸亨元年藏年二十八榮國夫人奄歸冥路則天皇后廣樹福田度人則擇上達僧捨宅乃成太原寺於是受顧託者連狀薦推帝諾曰俞仍𮨕新剎周羅遂落敻𭠮常科此之謂削染因緣豈非以方便心推求簡擇趣真方便乎第四科曰既出家未進具承旨於所配寺講百千經時屬端午天后遣使送衣五事其書曰蕤賓應節角黍登期景候稍炎師道體清適屬長絲之令節承命縷之嘉辰今送衣裳五事用符端午之數願師承茲采艾之序更茂如松之齡永耀傳燈常為導首略書示意指不多云後於雲華寺講有光明現從口出須臾成蓋衆所具瞻延載元年講至十地品香風四合瑞霧五彩崇朝不散縈空射人又感天華糝空如霰中宗讚所云講集天華是後於佛授記寺譯新經畢衆請藏敷演下元日序題入文洎獵月望前三日晚講至華藏海震動之說講室及寺院欻然震吼聽衆稻麻歎未曾有當寺龍象狀聞天上則天御筆批答云省狀具之昨因敷演微言弘揚祕賾初譯之日夢甘露以呈祥開講之辰感地動而標異斯乃如來降祉用符九會之文豈朕庸虛敢當六種之動披覽來狀欣暢兼懷仍命史官編於載籍無慮前後講新舊兩經三十餘遍大帝永隆年中雍州長安縣人郭神亮者修淨行暴終諸天引詣知足天宮禮敬慈氏有一菩薩讓之云何不受持華嚴亮以無人講為辭曰有人見講胡得言無及蘇委說衆驗藏之弘轉妙輪人天咸慶矣故演義鈔顯證云講得五雲凝空六種震地向非入慈悲之室著和忍之衣升空觀之座而能融智海播辨河者孰能與於是乎此之謂講演因緣豈非以牢固心設逢極苦樂受深觀心不捨離乎第五科曰夫華嚴大不思議經者乃常寂光如來於寂場中覺樹下與十方諸佛召塵沙菩薩而所說也龍勝誦傳下本滿十萬偈東晉廬山釋慧遠以經流江東多有未備乃令弟子法淨法領等踰越沙雪遠尋衆經法領遂至遮拘槃國求得前分三萬六千偈來歸時有佛賢三藏為僞秦所擯投趾東林遠善視之馳使飛書解其擯事賢後至建康於道場寺譯出領所獲偈南林寺法業筆受成五十卷則知西天應北天之運契期金水之年東林助南林之緣發光木火之用共成大事益耀中華東安寺慧嚴道場寺慧觀及學士謝靈運等潤文分成六十卷然於入法界品內有兩處文脫一從摩耶夫人後至彌勒菩薩前中間天主光等十善知識二從彌勒後至普賢前中間脫文殊申手案善財頂等半紙餘文歷年僅乎四百製疏餘乎五三經來未盡之言猶如射地義有不安之處頗類窺天莫究闕遺強成箋釋唯藏每慨百城之說多虧一道之文捧香軸以徒悲擁疑襟而莫決引領西望日庶幾乎果至聖唐調露之際有中天竺三藏地婆訶羅此云日昭齎此梵本來屆藏乃親共讎校顯驗缺如聲聞于天尋奉綸旨與成塵基師等譯出補之復禮潤文慧智度語依六帙本為定暨女皇革命變唐為周遣使往于闐國求索梵本仍迎三藏實叉難陀此言喜學譯在神都作起乎證聖牂年功成乎聖歷狶歲計益九千偈勒成八十卷通舊翻合四萬五千偈命藏筆受復禮綴文梵僧戰陀提婆二人譯語仍詔唐三藏義淨海東法將圓測江陵禪師弘景及諸大德神英法寶而下審覆證義於譯堂前陸地開百葉蓮華衆睹禎祥競加精練然攻木後其節目致貫華眩彼文心雖益數品新言反脫日照所補文既乖緒續者懵焉藏以宋唐兩翻對勘梵本經資線義雅協結鬘持日照之補文綴喜學之漏處遂得泉始細而增廣月暫虧而還圓今之所傳第四本是清涼山鎮國沙門澄觀疏玄義云其第三本先已流行故今代上之經猶多脫者願諸達識見闕而續之則觀之纍詞悃愊後進宜勿忘焉久視年中又奉詔翻大乘入楞伽經七卷進內璽書褒之曰得所譯楞伽經補求那之闕文翦流支之繁句鈎深致遠文要義該唯識論宗於茲顯矣凡與日照譯密嚴等經論十有餘部合二十四卷竝則天制序深加讚述復至神龍年中與喜學奉詔於林光殿譯大寶積經文殊師利授記會三卷藏本資西胤雅善梵言生寓東華精詳漢字故初承日照則高山擅價後從喜學則至海騰功得以備詢西宗增衍東美𭠮乎十德之萃擷其九會之芳此之謂傳譯因緣豈非以無間心觀其真理盡未來際不覺其久乎第六科曰初至相儼和尚每嗟大教久阻中興會驅光統椎輪益仰聖尊大路因躡扶纖指於慧表緝妙宗於毫端成華嚴經中搜玄義鈔五卷其文也玉寡其理也金相追琢為難鎔裁有待藏以親窺室奧獨擅國工善巧逞能其器甚利乃效同恥者之述撰探玄記二十通俾璞玉耀嚴身之華渾金成刮膜之具既玉無泣者或金可懸乎抑且味搜探之二言品先後於一字先搜則艱矣搜者索求具擇閲衆聚七訓後探則便焉探者取試循引候五訓其難也擇而聚之之勞其易也引而取之之速蓋師列十門而搜已資尋一經而探之然或㳂淺就深陟遐自邇聊憑俗諦試較真談則周禮夏官條職名中有搜人焉有探人焉搜人掌十二間務審行九政以導悟昏蒙其猶儼之搜玄統十二分教宗舉九部以開示知見耶探人掌誦敘王志道國政事以巡天下而喻說諸候使不迷惑曉萬民之心正向王化亦猶藏之探玄傳通佛意演法宗趣以喻世間而掩映衆說使不混淆開群生之目深感佛恩耶窮一化之始終資二玄之廣略可謂立之斯立正是玄之又玄若向二帙不倚五編則撫持也儻然靡暢或據五編不憑二帙則咀嚼也淡乎無味野諺云師明弟子哲豈前後相成之謂乎舉要言之搜玄者索隱之離辭探玄者鉤深之異語隱能心索十玄之妙旨霞張深可力鉤十義之圓科月滿儼公搜玄分齊者豈謂大經玄旨有分齊而可搜乎但自立十玄義門以通經旨俾通智境應指言搜十玄義之分齊耳冒陳瞽言幸詳其致遂使包羞者前哲受賜者後生儼藏連稱提孩具審古所謂死且不朽久而彌芳者歟自餘鐘虛而有問必酬劍利而無疑不剖涉華嚴之縕者撮機要而補之其名數曰教分記三卷指歸一卷綱目一卷玄義章一卷策林一卷就是示歸路之十科也各標十義通顯百門移海影於目前簇蓮界於掌上復以行願所極止觀方成乃擬天台法華著華嚴三昧觀華藏世界觀妄盡還源觀各一通可令有目得珠孰曰我心匪鑑蔚傳盛觀雅契沖宗又顧象教誕敷龍經𥧲盛大經結集之後龍王收入其宮樹誦傳下本亦是大龍菩薩所導化焉況初譯經時龍變青衣童子躬自給侍道英說海神來聽致雨救旱亦是二韻故輒號曰龍經亦猶儒教春秋感麟而作目為麟史或稱麟經四聖標題義亦無爽讀誦者竹葦聲訓為𥱼橇而況天語土音燕肝越膽苟非會釋焉可辨通遂別鈔解晉經中梵語為一編新經梵語華言共成音義一卷自敘云讀經之士實所要焉新經音義不見東流唯有弟子慧苑音義兩卷或者向秀之注南華後傳郭象之名乎或應潤色耳實顯驗言題誨人不倦古有華嚴經內佛名二卷菩薩名一卷莫知集者而鳩聚闕如藏乃𨵃載其名略無遺漏添成五軸為世所珍經出虬宮已來西東靈驗繁蔚而或班班僧史或聒聒俚談義學之徒心均暢日耳功是競躬覽者稀由是簡二傳而聚異聞考百祥而謄近說緝華嚴傳五卷或名纂靈記此記未畢而逝門人慧苑慧英等續之別加論贊文極省約所益無幾使千古如面知祖習之無妄焉楞伽實難於往入密嚴非易得鉤深梵網真詮法門嚴憲三界無怙唯戒可恃皆成義疏備舉源流楞伽密嚴疏未詳卷數梵網經疏三卷見行於世加且發蒙即山下出泉升進乃地中生木三根雖異十信是資導義流俾歸教𥧲於是製起信論疏兩卷別記一卷疏或分為上中下三十二門論法界無差別論亦編正義如別流行多心雖小不輕疏出塵中經義法華或云有疏餘光未照扶桑媧皇之代太皡也玉鏡披圖金輪耀德顧貝葉之書甚博祈悉檀之訣稍頻乃貢金師子章一篇而仰悟之此作也搜奇麗水之珍演妙祇林之寶數幅該義十音成章疑觀奮吼於狻猊勝獲賮賝於鵝雁雖云遠取諸物實乃近取諸身以頷下之光為掌中之寶則彼玉龍子之實玩豈如金師子之虛求玉龍子之靈異具如明皇雜録啓沃有餘古今無比復念妙度餘六真歸在三般若母於勃陀引無極也僧伽孫於曇摩續莫大焉故製三寶別行記一卷均曉盲聾故也晚以新經既加一會舊疏或涉三思爰隨補袞之文聊括提綱之義重述略疏始妙嚴品至第六行迎知報盡因越次析十定微言僅了九定未絶筆而長逝料簡有十二卷演義鈔云聖后所翻文詞富博賢首將解大願不終方至第十九經奄歸寂滅遺恨何極門人宗一慧苑兩續遺一師足二十軸頗近從蠅苑公成十六編或譏繼組是惟尺有所短詎得寸無所遺演義鈔云苑公言續而前疏亦刊筆格文詞不繫先古致令後學輕夫大經使遮那心源道流莫挹普賢行海後進望涯將欲弘揚遂發慨然之歎云云故製疏十意中第三扶昔大義者皆顯藏公之述此之謂著述因緣豈非以折伏心或若失念煩惱暫起即便觀察折伏使觀心相續乎第七科曰藏年十六鍊一指於阿育王舍利塔前以申法供越翌載因入山學道屬慈親不悆歸奉庭闈綿歷歲時能竭其力總章初藏猶為居士就婆羅門長年請授菩薩戒或謂西僧曰是行者誦華嚴兼善講梵網叟愕且唶曰但持華嚴功用難測矧解義耶若有人誦百四十願已為得大士具足戒者無煩別授號天授師及後曆曰永隆元年覲親于夏州道次郡牧邑宰靡不郊迎緇侶為榮屬神龍初張柬之叛逆藏乃內弘法力外贊皇猷妖㜸既殲策勳斯及賞以三品固辭固授遂請回與弟俾諧榮養至二年降敕曰朝議郎行統萬監副監康寶藏頗著行能早從班秩其兄法藏夙參梵侶深入妙門傳無盡之燈光照暗境揮智慧之劍降伏魔怨凶徒叛逆預識機兆誠懇自衷每有陳奏姦回既殄功效居多雖攝化無著理絶於酬賞而宅生有緣道存於眷顧復言就養實寄天倫宜加榮祿用申朝獎寶藏可游擊將軍行威衛隆平府左果毅都尉兼令侍母不須差使主者施行斯惟智鏡如磨戒珠無纇進度協忠貞之節慈光融孝友之規故得神人無功匪伐其善君子不械能尊厥親曾子所言國人稱願然曰幸哉有子如此所謂孝也已者法師其人也此之謂修身因緣豈非以善巧心靜觀真理不礙隨事巧修萬行乎第八科曰垂拱三載雲漢之詩作矣詔藏於西明寺立壇祈之長安邑尹張魯客為請主每夕齊戒未七日雨沾洽天冊萬歲中雍州長吏建安王綰留務值愆陽亦求藏致之應如響答嘗於曹州講場適辨教宗邪正有道士謂訾玄元含怒問曰諸法為平等以不答平等不平等又問何有二耶答真俗異故非一槩黃冠益大詬三寶翌旦面歘見鬚眉隨手墮落遍體瘡疱遽來懺過願轉華嚴百遍讀經未半形質復舊神功元年契丹拒命出師討之特詔藏依經教遏寇虐乃奏曰若令摧伏怨敵請約左道諸法詔從之法師盥浴更衣建立十一面道場置光音像行道始數日羯虜覩王師無數神王之衆或矚觀音之像浮空而至犬羊之群相次逗撓月捷以聞天后優詔勞之曰蒯城之外兵士聞天鼓之聲良鄉縣中賊衆覩觀音之像醴酒流甘於陳塞仙駕引纛於軍前此神兵之掃除蓋慈力之加被長安四年冬杪於內道場因對揚言及岐州舍利是阿育王靈跡即魏冊所載扶風塔是則天特命鳳閣侍郎博陵崔玄暐與藏偕往法門寺迎之時藏為大崇福寺主遂與應大德綱律師等十人俱至塔所行道七晝夜然後啓之神輝煜爚藏以昔嘗鍊指今更隳肝乃手擎興願顯示道俗舍利於掌上騰光洞照遐邇隨其福力感見天殊或覩銑鋈睟容或觀纓毳奇像瓌姿瑋質乍大乍小大或數尺小或數寸於是頂釭指炬者爭先捨寶投財者恥後歲除日至西京崇福寺是日也留守會稽王率官屬及五部衆投身道左競施異供香華鼓樂之妙矇聵亦可覩聞洎新年端月孟旬有一日入神都敕令王公已降洛城近事之衆精事幡華幢蓋仍命太常具樂奏迎置於明堂觀燈日則天身心護淨頭面盡虔請藏捧持普為善禱其真身也始自開塔戒道達于洛下凡擒瑞光者七日抱戴者再初發匣日一也行至武功縣界其光傍亘法門寺二也宿崇福寺置皇堂內光如火焰又似星流三也行次崇仁坊門因光高舉且抱且戴四也宿渭南縣興法寺夜如晝五也行至壽安縣界光既衝天日又抱戴六也安置于明堂以兜羅綿𭣋天后及儲君頂戴時七也崔致遠曰愚於咸通十五年甲午春在西京于時懿宗皇帝命使迎奉真身來自鳳翔目覩瑞應多是類焉至有牛駕香車而禮拜者三鶴當寶輿而佪翔者四諸坊竪塔多致動搖中宗復位神龍元年冬敕令寫藏真儀御製讚四章曰宿植明因專求正真菴園晦跡蓮界分身闡揚釋教拯濟迷津常流一雨恆淨六塵其一辨囿方開言泉廣𤀹護持忍辱勤修精進講集天華徵符地震運斯法力殄茲魔陳其二爰標十觀用契四禪普斷煩惱遐祛蓋纏心源鑒徹法鏡澄懸慧筏周運慈燈永傳其三名簡紫震聲流紺域梵衆綱紀僧徒楷則鎮洽四生曾無懈息播美三千傳芳百億其四三十二句百二十音入八言雖文表虛宗而事皆實録景龍二年中夏憫雨命藏集百法師於薦福寺以法禱之近七朝遽致滂沱過十夜皆言浹洽狀告詔批曰法王乖範調御流慈敷百座以祈恩未一旬而獲應師等精誠講說當致疲勞省表循環再三欣悅後踰再朏救嘆如初敕曰三寶熏修一本云重修或謂再設百座講乎一旬流液慈雲演蔭法雨含滋師等精誠遽蒙昭感由是中宗睿宗皆請為菩薩戒師崆峠之遺美是追萬乘歸心八紘延首無機見阻有苦待除藏顧新經化大行焉知真丹根遍熟矣因奏於兩都及吳越清涼山五處起寺均榜華嚴之號仍寫摩訶衍三藏并諸家章疏貯之善願天從功侔踊出尋復請許雍洛閭閻爭趨梵筵普締香社於是乎像圖七處數越萬家南齊王之精修西蜀宏之善誘重興茲日敻掩前朝故人皆不名而稱華嚴和尚焉景雲再春時雨罕潤冬又不雪人皆籲天君命召藏禁中懇訊救農之術乃啓沃曰有經名隨求則得大自在陀羅尼若結壇淨寫是總持語投於龍湫應時必獲詔可其請遽往藍田山悟真寺龍池所作法未旬大雪表聞制報曰敕華嚴師比屬愆陽憂纏寢食故令潭所啓請祈恩遽得三寶流慈兩度降雪師等精誠上感遂乃盈尺呈祥欣稔歲之有期喜豐年之可望慮不周洽且未須出山屈師重更用心待後進止及六出遍四方復降詔曰敕華嚴師寒光稍切不委法體何如昨者使還云師燒香才畢旋降甘雪雖則如來演貺實由啓懇虔誠預喜豐年略茲示意至先天元年十一月二日太上皇以藏誕辰賜衣財暨食味誥曰敕華嚴師黃鐘應律玄序登司欣承載誕之祥喜遇高祺之慶乘茲令日用表單心故奉法衣兼長命索餅既薦四禪之味爰助三衣之資願壽等恆沙年同劫石霜景微冷法體安和近阻音符每增翹仰因書代敘筆不宣心橋陵脫屣褰衣忘機養德以藏乃心王室每著精勤悟道有因嚴師無怠別賜絹二千匹俾贍興福所須至如井中騰素呾纜之光耳餐奇說氷內現窣覩波之影目驗嘉祥偈排地獄之災二十字俾知心佛經拔钁湯之苦七百人來跪群僧藏乃或辨彼金言所從或假其玉軸令寫具如華嚴傳內所述王氏及何容師之事莫不惰學者起懸頭之志阽危者荷援手之慈此之謂濟俗因緣豈非以不二心隨事萬行與一味真理融無二乎第九科曰世寡尚賢皆慚下問人多自聖莫悟大迷加復語異華戎教分權實而唯尋末派罕究本源信若飛蓬窺同側管致使廗上之義多臆斷黌中之言或面從縱有梵旅來儀伽談委悉翻加擯黜之辱懶致咨諏之勤藏也蓄鋭俟時解紛為念既遇日照三藏乃問西域古德其或判一代聖教之升降乎答曰近代天竺有二大論師一名戒賢二稱智光賢則遠承慈氏無著近踵護法難陀立法相宗以一乘為權三乘為實唐三藏奘之所師宗光即遠體曼殊龍勝近稟青目清辨立法性宗以三乘為權一乘為實青目有本云提婆由是華梵兩融空色雙泯風除惑靄日釋疑氷具如探玄所釋外訓有言醫不三世不服其藥矧於聖典叵謬憲章以梁陳間有慧文禪師學龍樹法授衡嶽思思傳智顗顗付灌頂三葉騰芳宛若前朝佛澄安遠聽憶靈山之會夢聆台嶺之居說通判四教之歸圓悟顯一乘之極藏以寢處定慧異代同心隨決教宗加頓為五其一曰小乘教其二曰始教其三曰終教其四曰頓教其五曰圓教就是或開或合有別有同融正覺之圓心變方來之邪見永標龜鏡實淬牛刀從學如雲莫能悉數其錚錚者略舉六人釋宏觀釋文超東都華嚴寺智光荷恩寺宗一靜法寺慧苑經行寺慧英竝名雷於時跡露於後至比丘尼衆從問道者多誦晉經大都稟教僧尼僉以護律栖禪為恆務即知華嚴本祖自阿難海而來龍猛佛賢禪風靡墜觀行雙翼可缺一乎初藏與海東義想法師同學其後藏印師說演述義科寄示於想仍寓書曰夙世同因今生同業得於此報俱沐大經特蒙先師授茲奧典希傍此業用結來因但以和上章疏義豐文簡致令後人多難趣入是以具録微言妙旨勒成義記傳之彼土幸示針誨想乃自閲藏文如耳聆儼訓掩室探討涉旬方出召門弟子可器瀉者四英真定相圓亮元表訓俾分講探玄人各五卷告之曰博我者藏公起豫者爾輩因榍出榍執柯伐柯各宜勉旃無自欺也且海表覺母想為始祖然初至止若東家丘及法信遐傳得群迷遍曉斯實暗燭龍之眼頓放光明織火鼠之毛益彰奇特誘令一國學遍十山海東華嚴大學之所有十山焉中嶽公山美理寺南嶽知異山華嚴寺北嶽浮石寺康州迦耶山海印寺普光寺熊州迦耶峽普願寺雞龍山岫寺括地志所云雞藍山是朔州華山寺良州金井山梵語寺毗瑟山玉泉寺全州母山國神寺更有如漢州負兒山青潭寺也此十餘所雜華盛耀蟠桃亦藏之力爾日出月走俱在於東頓漸兩圓文義雙美此之謂垂訓因緣豈非以無礙心理事既全融不二還令全理之事互相即入乎第十科曰先天元年龍集壬子周正月月幾望右脅于西京大薦福寺享年七十僧夏未悉誕以辜月歿亦如之則李巡有任養之評孫炎有蟄伏之解應茲兩釋終彼浮生矧乃其來也居朔後其去也在望前是表漸圓先標等覺豈非菩薩清涼月遊於畢竟空者哉越五日太上皇賜誥賻贈曰中使故僧法藏德業天資虛明契理辨才韞識了覺融心廣開喻筏之門備闡傳燈之教隨緣示應乘化斯盡法真歸寂雖證無生之空朝序飾終宜有褒賢之命可贈鴻臚卿賻絹一千二百匹葬事準僧例官供唐制文武官薨卒一品賻物二百端粟二百碩降及九品限止十端今茲厚禮可驗皇恩有司給營墓夫卒人功十日諸王公降及士庶禮懺施捨叵歷數焉以其月二十四日葬於神禾原華嚴寺南送葬之儀皆用追寵典屬國三品格式禮也門人請祕書少監閻朝隱撰碑文概表行跡翌載中春建于塔所古所謂其生也榮其死也衰此之謂示滅因緣豈非以圓明心頓觀法界無障無礙乎麟史稱歿有令名者三立焉則法師之遊學削染示滅三立德也講演傳譯著述三立言也修身濟俗垂訓三立功也演一乘圓旨憑十節妙緣廣記備言庶或有中傍𧥮訶者引文心云舊史所無我書則博欲偉其事此訛濫之本源述遠之巨蠧也子無近之乎雖多奚為以少是貴愚𥈌焉曰敬佩良針然立定哀之時書隱元之事信以傳信疑以傳疑自古常規非今妄作況此皆憑舊說豈衒新聞且記藏公之才之美也實得面無怍色口無愧辭顧起信多小之詮撰成行廣略之録一傳一碑又史者使也執筆左右使之記也傳者轉也轉授經旨傳廣碑略使授於後恭以師兄大德玄準為名仍以大乘遠為別號體葉偈之旅首花嚴之座嗣仍孫於想德欽益友於藏公且曰古賢以取其言而棄其身心為盜也今學則稟其訓而昧其迹顏實靦焉況有小鳴之徒或陳大嚼之說玷污前哲眩惑後生雖復閻朝隱有碑釋光嚴有傳惰於披閲勇在矯誣矣至有譏史學為魔宗黜僧譜為廢物及談疏主緣起或作化人笑端是謂宴朋不無忝祖可掩耳而走豈俾躬處休以致遠嘗宦玉京濫名金榜聊翻鵙語或類象骨遂命直書難從曲讓有乖即正無異不編猶恨目瞶寶洲耳驚金奏仙枰一遇因路盡而坐忘帝樂九成俄曲終而夢覺罪知相半用捨在緣緬徵關右之評顗續遼東之本後博贍者幸刪補焉于時天復四春枝幹俱首於尸羅國迦耶山海印寺華嚴院避寇養痾兩偷其便雖生下界幸據高齊平揖群峰敻拋世路而所居丈室密邇蒙泉韶光煦然潤氣蒸兵衣如遊霧露座若近陂池加復病躬目勞燒炙是使棲闐華水窗霏艾煙厭生而或欲梵軀志問疾者多皆掩鼻有誰逐臭空慚海畔一蕕無所竊香莫遂山中三嗅及修斯傳自責增懷傷手足虞含毫不快欻聞香氣郁烈有餘斷續再三尋無來所誰料羸君歸載變成荀令坐筵時有客僧持盈亦言異香撲鼻春寒劓嚏因爾豁然僕既勇於操觚僧亦欣於齆斯豈掇古人芳跡播開士德馨之顯應乎傳草既成又獲思夢覩一緇叟執一卷書而曉愚曰永徽是永粲元年也劃爾形開試自解曰此或謂所撰録永振徽音長明事跡始於今日故舉元年者耶然而深恧諛聞莫排疑網適得藏大德遺像供養因削二短簡書是非二字為筊擲影前取裁再三是字獨見心香所感口訣如聞古德既陰許非非今愚乃陽增病病不為無益聊以自寬或人不止囅然且攎胡曰子所標證說春夢可乎哉愚徐應曰是身非夢歟曰是然則在夢而欲黜夢其猶踐雪求無迹入水願不濡者焉書不云乎有大夢然後有大覺如睡夢覺故名佛也抑且王者以乾坤謫見每慎方來庶人以晝夜魂交能防未兆譬形端影直豈心正夢邪人或不恆巫醫拱手苟冥應悉為虛妄念大亦涉徒勞耶聞昔尼父見周公高宗得傳說信相金鼓普眼山神皆託靈遊能融妙理故兩朝僧史亦一分夢書況聖教東流本因睡感從昏至曉出假入真今也出則窘步樵原入則酣眠燬室暫息凄凄之歎宜從栩栩之遊客既溺客之笑容豫乃宰豫之睡興因憶得吳中詩叟陸龜蒙斷章云思量浮世何如夢試就南窗一𥧌看於是乎擲握筆引幽枕遠尋宰豫我近訪邊孝先瞥遇二賢各吟五字曰糞牆師有誡經笥我無慚僕於恍惚中續其尾云亂世成何事唯添七不堪大安八年壬申歲高麗國大興王寺奉宣雕造本寂居士梁璋施本鏤板紹興十五年四月伏奉指揮許與編華嚴宗教文字入藏流通莫不慶幸唯侍講崔公所撰吾祖賢首國師傳缺如遍搜雖得而傳寫訛舛攻證不行遂獲高麗善本復得祕書少監閻公石刻乃頓釋疑誤有士人孫霨見且驚喜而為書之坐夏門人旋積嚫施命工鏤版以廣其傳冀學者勉旃上酬法乳首座師雅監院會真維那妙智梵全書記法慧副院從悟知客如頴典座釋懷修證仲明了性道詢智聰祖仁師友行勤祖超從信善求從慧妙暉法瓊宗勝道時祖周行依從釋如了子冲祖高法無法和了慧善賓了依義琚法懷雅法蓮彥依善定宗慧從擇智圓義淨師遠從誘師正時紹興十九年孟冬一日平江府吳江縣華嚴寶塔教院嗣講住持圓證大師義和謹題躅厨玉切蹢躅掇都括切芟所嵓切除草月支月音燕康居居音渠膜莫胡切胡人膜拜聘馳騁讓責也牂則郎切與臧同狶音喜末年屬羊狶亥年屬猪擷胡結切將也追都雷切治金日追玉曰琢奰平祕切荒佩切洗也揚暐于鬼切煜余六切爚弋灼切瓌古回切瑋偉鋈鳥沃切籲音裕呼也新刊賢首碑傳正誤龍華道忠著此書元祕藏于高山寺寶庫宋刻摺本蓋大藏函內物也齊雲老師嘗寫得之碑每行二十三字半紙面十行傳每行二十字半紙面七行有𤀹鳳潭者就雲借之有自難讀處則貼小片紙於上方曰脫字歟字倒歟皆不契雲之意以墨抹滅後鳳潭不謀於雲師而自梓行嘗為脫為倒者悉私加字妄刪文己之難解者皆改換焉豫及對校於雲師之本大愕其所為從頭依舊文改正録上頭而復古矣又恐不能及遠廣益別作正誤一卷間下證解大抵見刊行者加和點極寡學而却不知己之難讀者是己之暗昧之使然每遇盤根錯節縱情刪潤可深以為笑也夫為寡學之難讀而改文加字則天下無好書𤀹欲流通却厄於古書誤於後人縱免人師之筆誅必受天龍之譴責矣碑正誤第一張左一行名播招提名元本作大濬妄改以為對下譽字縱大字義不穩亦但可存古也七行脫屣萬機褰衣四海脫屣出孟子褰衣出毛詩事文前集十九卷汪藻上太上道君皇帝尊號玉冊文云脫屣萬乘粃糠唐虞云云又云乃委神器褰裳去之第二張石八行辨才辨元本作辨字彙正字通雖辨辨不分二皆有注寫者可從元本也左二行𭎸塔𭎸元本作墳五行西方淨域云云此偈猶當有數句蓋遺脫可惜元本亦同此傳正誤每紙題支那每紙摺處有支那二字元本無之凡典籍摺處有題支那撰述以分於天竺日本諸撰今題支那必亦其意也然則碑支那撰述可也傳則海東崔致遠作實海東撰述也而題支那何也第一張右崔致遠齊雲師曰崔致遠傳在東國通鑑第十一又唐書藝文志有文二十卷其在高麗文集有三十卷纂靈記賢首撰事見此第九張然其中云撰藏公別録者按華嚴玄談云纂靈記後經修飾止此此等亦是後加之文故云爾井識用莊子秋水篇坎井之蛙事言井蛙之識至眇也又韓文原道曰坐井而觀天曰天小者非天小也止此坐井之狹識也僧祐出三藏記集序云井識管窺多慚博練又出三藏記曇無讖傳云坎井之識久迷大方八行大史公大元本作太左一行盈數十數也三行堅固心堅元本作牢濬妄改五行書云措諸枉思無邪措諸抂出論語思無邪出毛詩六行經曰為淨土是道場云云出淨名經第二張右一行外所謂因生以賜姓外謂外典也事見左傳三行內所謂四海入海內謂內典也事見阿含經四行祖父祖元本作王濬妄改按爾雅釋親父之考為王父注如王者尊之止𤀹未讀爾雅自謂今帝王之父則不成義故改為祖八行弟寶藏法藏之俗弟又見下文左四行忽覩忽元本作忽筆工誤第三張右八行薦推推元本作雄八行帝諾諾元本作若九行𭠮常科𭠮元本作拔筆工誤下皆例知左八行崇朝字出詩第四張右三行祕元本亦同蓋筆誤當作頤六行無慮前漢書食貨志曰大氐無慮皆鑄金錢矣注無慮謂大率無小計慮耳左三行窂固窂元本作牢筆工誤第五張右一行建康康元本作業濬妄改按廣輿記江寧府曰吳自京口徙都於此曰建業晉曰建康止蓋𤀹以謂古名建業後既改建康則不可更稱建業故改康也安知書傳處名往往有從舊名者左二行地婆訶羅此云日昭元本羅作國實筆誤也𤀹貼雲本云國當作羅蓋𤀹見此一訛以謂全編多訛舛𤀹所改但此為是餘皆非也凡讀三經五論者乃知地婆訶羅未以此為奇妙日昭之昭元本作照第六張右二行續者續元本作讀筆工誤六行今代上之經如發云上恐土字謂代州也六行𭠮乎𭠮元本作拔十行光統椎輪益仰聖尊大路因躡文選序曰若夫椎輪為大輅之始大輅寧有椎輪之質注向曰椎輪古棧車大輅玉輅言玉輅因椎輪生止余見𤀹加和點未讀文選也又句讀上下文大失義彼貼紙於雲本云躡字下脫一字歟可笑第七張右一行其文也玉寡其理也金相禮記聘義云子貢曰君子貴玉而賤珉者何也為玉之寡而珉之多與文選劉孝標辨命論云玉質金相注善曰毛詩曰追琢其章金玉其相毛萇曰相質也銑曰玉金所以比美君子質相言其形貌也梁書王裒弔祭王僧辨母文曰金相比映玉德齊溫舊唐書音樂志樂章曰金相載穆玉重暉七行取試循循元本作楯八行師列乃至資尋云云師至相也資法藏也師資字出老子左三行諸候候元本作侯筆工誤若向二帙乃至儻然靡暢或據五編元本云向若二帙不倚五編則撫持也儻然靡據五編不憑二帙則呾嚼也淡乎無味此文多少分明但𤀹不得讀下妄為有倒脫乃貼雲本云向若二字倒乎靡據中間脫二字歟及開板終向若作若向靡下加暢或二字穢亂古書罪戾彌天且如言向二帙則是何等語話哉蓋向若已下者反釋也華嚴疏第十三曰向若有性不可熏變止鈔曰向若有性下上來順釋此下反釋第八張左四行四聖標題聖元本作靈濬妄改𤀹未讀禮記未知麟鳳龜龍謂之四靈妄改為聖本解龍經麟經之義而今改為聖則大為無義也五行辨通辨元本作辨第九張右一行班班元本作斑斑二行心均暢日暢元本作愒濬妄改左傳昭元年曰主民玩歲而愒日林注玩愒皆貪也言執政為民之主而貪玩歲日愒開去聲止𤀹未讀左傳而妄改為暢左五行祇林之寶寶元本作定六行實乃實元本作實妄改字彙實音殖實也增韻注實實通用誤止實有實也訓則義亦通又不與實通用則不可妄改也第十張右六行苑公成公元本作上濬妄改高僧傳僧遠以齊永明二年卒帝世祖武帝致書於沙門法獻曰承遠上無常弟子夜中已自知之遠上此去甚得好處諸佳非一止又出三藏記集僧祐十誦義記目録序云大律師頴上積道河西振德江東止蓋上者裁用上人字也僧傳遠上出三藏頴上可以為例證矣𤀹未讀如上書妄改上字左八行授號天授師及後曆曰永隆元年元本授下有後及曆三字此後及曆作名一字無永字元本曰授後及曆號天授師名曰隆元年云云𤀹貼雲本云此一行文有漏處義不疏通歟他日請領教示雲師以墨抹貼紙然𤀹及開板未領教示妄加妄改又書上方曰此一行文有漏處歟抑元本不可讀而濬妄改者非為令易讀耶今雖改猶似有漏處而不可讀則妄改何所益但存元本不可讀而可也今如豫之所點則義亦明白也或曰字作日月之日則對上天字此編貪對語故然言師道名日日隆盛也元年者天授元年也九行張柬之叛逆柬元本作易按張易之叛逆而張柬之討之實柬之非反逆者𤀹未讀唐史通鑑妄改字誣柬之陷叛逆莫大之罪不識者歸責於崔致遠豈非枉屈耶通鑑綱目中宗神龍元年曰春正月張柬之等舉兵討武氏之亂張易之昌宗伏誅十一張右七行實寄天倫實元本作實濬妄改八行主者施行敕書尾語式也廣弘明集周武帝詔尾曰主者施行止見𤀹和點似未知此字左六行長吏吏元本作史七行辨教辨元本作辨十二張右四行盥浴盥元本作釁按國語齊語曰嚴公使束縛管仲以豫齊使齊使受而以退比至三釁三浴之注以香塗身曰釁釁或為熏正字通釁注許定切欣去聲云云又通作釁又塗也周禮女巫釁浴謂以香藥沐浴也六行逗撓史記韓長孺傳云廷尉當王恢逗撓當斬注軍法行而逗留畏撓者要斬撓屈弱也九行慈力元本作蓋筆工誤字彙蓋又作蓋止而無字左六行天殊止觀二之三卷云其性天殊應法記云天乖謂同天地之別止今亦天地殊之義也十三張左四行纏元本作蓋十四張右十行南齊王西蜀宏蓋皆人名濬點非左一行景雲唐睿宗年號六行寢食寢元本作寢筆工誤十五張右一行雖則如來演貺詩經周南汝墳篇云雖則如燬父母孔邇太冲魏都賦云雖則生常固非自得之謂也止雖則字格不一而下點為法則義非八行橋陵唐睿宗也一統志陝西西安府曰睿宗橋陵在蒲城縣豐山文獻通考百二十五曰睿宗崩葬橋陵在京兆府奉先縣界八行脫屣褰衣謂帝者讓位也前碑文曰太上皇脫屣萬機褰衣四海𤀹上方書曰此行脫字義未穩乎止余觀之此行義皆明白蓋到筆不宣心者書誥之辭也橋陵已下撰者之語言睿宗後讓位養德皆依法藏之勸導也左二行辨彼金言辨元本作辨四行阽危出前漢書食貨志十六張右六行青目有本元本無有字濬妄加十行宛若若者譬喻之如義濬點為指事之如義非也左一行寢處寢元本作寢筆工誤十七張右十行若東家丘言義想初未能振華嚴宗於海東人馴侮之如所謂東家孔丘也東家丘出劉向新序觀𤀹點似未知此事左三行岫寺岫元本作岬濬妄改字彙岬古狎切音甲五行亦蓋元本作蓋八行周正月夏十一月也九行辜月爾雅釋天曰十一月為辜十八張右七行官供前碑亦載之云餘皆官供止義最明左四行死也衰衰元本作哀濬妄改論語子張篇曰其生也榮其死也哀止𤀹以為當作衰而對上榮若死也衰微則何所讚美也五行麟史左傳也十九張右三行實得面實元本作實七行仍孫爾雅七行益友論語左二行僧譜為廢廢元本作廢三行處休莊子漁父篇云不知處陰以休影四行象骨骨元本作胥蓋筆誤當作胥𤀹妄改骨是何義象胥見周禮三十八七行罪知孔子作春秋曰知我罪我其唯春秋乎見孟子又史記孔子世家七行顗續顗元本作覬濬妄改跋十九張左枝幹俱首十二支首子也十干首甲也蓋謂甲子也密邇蒙泉言近於泉也周易上象傳云山下出泉蒙二十張右二行梵軀梵元本作焚蓋因上灼艾言欲效古賢捨身也北齊第三王子於清涼山焚軀供養見華嚴玄談二行逐臭空慚海畔事出呂覽三行竊香僧貪蓮香池神呵之為偷香出智度論五行羸君歸載羸元木作嬴筆工誤嬴君言秦始皇嬴姓也見史記秦本紀歸載者言臭氣史記秦始皇本紀始皇崩於沙丘平臺行遂從井陘抵九原會暑上轀車臭乃詔從官令車載一石鮑魚以亂其臭五行荀令坐筵襄陽記云荀令君至人家坐席三日香七行齆元本作闒字彙正字通等無字闒注音踏說文樓上戶也齆字彙烏貢切音甕鼻塞曰齆十一行諛聞禮記樂記云發慮憲求善良足以諛聞不足以動衆注諛之言小也諛思了反十四行既陰許非非云云乃陽增病病史記韓世家曰其狀陽言與韓其實陰善楚止𤀹不知此字所點太非左二行傳說傳元本作傅二行信相金鼓四卷金光明經合部金光明經皆有信相菩薩夢金鼓事十卷金光明為妙幢菩薩妙幢即信相也我聞𤀹博學教乘賣講乎市衢大抵排古德然極不學而至未讀金光明經則和抵排非無疑也五行窘步樵原蓋用列子蕉鹿夢列子張湛注蕉與樵同五行淒淒元本作棲棲妄妄改八行一𥧌𥧌元本作寐筆工誤九行邊孝先後漢書列傳七十三文苑傳十二行七不堪文選四十三嵆叔夜與山巨源絶交書大字十行梁璋元本璋字細書紹興跋二十一張右六行驚喜驚元本作敬義亦通今妄改九行首座云云元本首座監院等字稍大左一行已下妙暉云云元本次位與此別元本云妙暉祖周道時宗勝法瓊行依如了法和法元祖高子冲了惠了依法蓮懷雅法瑫義琚彥依宗惠師遠義淨智圓從擇從誘善定從釋師正善賓二行法無無元本作元蓋誤書旡再誤為無三行時紹興云云元本到謹題縮為一行賢首碑傳正誤畢齊雲師書於卷尾云時寬文十年歲次庚戌冬十一月十八日後學道棟寫十一月二十日以宋刻高山寺藏本校勘了宋刻本玄字作玄樹字作樹弘字作𢎞貞字作𭾛驚字作驚敬字作敬讓字作讓擎字作恆字作恆澄字作皆避國諱也今不須避依舊書如字新羅崔致遠事實東國通鑑第十一卷二十二紙曰憲康王十一年乙巳唐僖宗光啓元年春三月崔致遠奉帝詔還自唐致遠沙梁部人精敏好學年十二隨海舶入唐求學其父謂曰十年不第非吾子也致遠至唐尋師力學十八登第調宣州漂水縣尉遷侍御史內供奉時黃巢反高駢為兵馬都統以討之辟致遠為從事以委書記之任其表狀書啓多出其手其檄黃巢有不唯天下之人皆思顯戮抑亦地中之鬼已議陰誅之語巢不覺下牀由是名振天下又上大師侍中狀云伏聞云云文長略之及還王留為侍讀兼翰林學士守兵部侍郎知端書監事致遠自以西學多所得欲展所蘊而衰季多疑忌不能容出為大山郡太守同卷第二十七紙曰真聖女主八年甲寅唐昭宗乾寧八年春二月崔致遠進時務十餘條主嘉納之以為阿餐致遠自西事大唐東還故國皆值亂世自傷不遇無復仕進意自放於山水間營臺榭植松竹枕籍書史嘯咏風月若慶州南山剛州氷山陝州清涼寺智異山雙溪寺合浦縣月詠臺皆其遊玩之所後挈家隱伽耶山與母兄浮圖賢俊及定玄師結為道友以終老焉焉遠西遊將還同年顧雲以詩送別有文章感動中華國之句其名重上國如此所著文集三十卷行於世唐書藝文志又載致遠四六集一卷桂苑筆耕二十卷云高麗沙門義天諸宗教藏總録上卷云賢首傳一卷浮石尊者傳一卷已上崔致遠述
