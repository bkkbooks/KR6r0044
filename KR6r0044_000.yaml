body:
  text: 新刊賢首國師碑傳敘昔唐翰林梁肅銘乎天台而荊溪創建祕書少監閻公朝隱碑于賢首而門人表顯想是兩君義由尚賢崇道讚頌於高僧其實豈同諛墓下人豐屋輦金而為時議者哉蔑加章安嘗著智者別傳流芳乎百代洎今不湮噫但至如僧千里之狀於法藏藍谷祥之列傳于清涼杳而罕聞余恆莫不為之慨然蓋其古德盛蹤高行既匿則澆世後進何藉觀而激感易轍愈策望標而漸乎賴有新羅國學士崔公字致遠普討群志搜乎是傳祖烈再耀然斯亦久不流行耳豫素有志於古自寫褚焉茲歲豫乃寓洛之日屬客有請刊行于梓欣而頷之更首附碑付之剞劂遂公同好繄世猶言其祖有美而弗知不明也知而不傳不仁也況我釋子不忍為此永錮於蔽善暈光之誚歟于時元祿歲次己卯仲秋搏桑攝津浪華僧濬鳳潭謹敘大唐大薦福寺故大德康藏法師之碑祕書少監閻朝隱撰夫得無障礙眼者身為佛身得無恐怖心者法為佛法過此已往行不圓滿功為未足遠生死則摘之以説空開冥途則勞之以救苦與大比丘衆應如是住不可思議法師俗姓康氏諱法藏纍代相承為康居國丞相祖自康居來朝父謐皇朝贈左侍中法師是如來得目有辟支一毛終年以勵堅貞竭日而修戒行年甫十六煉一指於阿育王舍利塔前以伸供養此後更遊太白雅挹重玄聞雲華寺儼法師講華嚴經投為上足瀉水置瓶之受納以乳投水之因緣名播招提譽流宸極屬榮國夫人奄捐館舍未易齊衰則天聖后廣樹福田大開講座法師策名宮禁落髮道場住太原寺證聖年中奉敕與于闐國三藏實叉難陀譯華嚴經神龍年中又與于闐三藏於林光殿譯大寶積經惟聖之所歸依惟皇之所回向爰降綸旨為菩薩戒師太上皇脫屣萬機褰衣四海亦受菩薩戒因行菩薩心法師糞掃其衣禪悅其食前後講華嚴經三十餘遍楞伽密嚴經起信論菩薩戒經凡十部為之義疏闡其源流如千燈光明自不相隔閡如一音演説各隨類信解其初以力入道也十大牛不如一青牛其終以力濟時也十香象不如一赤象於無量劫作無量緣伽藍許之為法橋者俗推之於法矩豈謂法橋斷而法炬滅同聲者椎胸叫喚異類者舉身毛竪先天元年歲次壬子十一月十四日終於西京大薦福寺春秋七十其年十一月二十四日葬於神和原華嚴寺南帝念若驚聖情如失誥曰中使故僧法藏德業自資虛明契理辨才韞識了覺融心廣開喻筏之門備闡傳燈之教隨緣示應乘化斯盡法真歸寂雖證無生之空朝序飾終宜有褒賢之命可贈鴻臚卿贈絹一千二百匹葬事準僧例餘皆官供妃主公主等禮懺展轉施捨勤祈所有𭎸塔飾終威儀導引莫不備具弟子等忍其死傳其教合掌頂禮嗚咽而不自勝其辭曰西方淨域離俗塵千葉蓮華如車輪不知何時成佛身
